name: Sync Upstream netboot.xyz Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write


env:
  ANDROID_SDK_ROOT: /mnt/sharedroot/github_runners/shared/android-sdk
  CARGO_HOME: /mnt/sharedroot/github_runners/shared/cargo-home
  GOCACHE: /mnt/sharedroot/github_runners/shared/go-cache
  PIP_CACHE_DIR: /mnt/sharedroot/github_runners/shared/pip-cache
  POETRY_CACHE_DIR: /mnt/sharedroot/github_runners/shared/poetry-cache
  NPM_CONFIG_CACHE: /mnt/sharedroot/github_runners/shared/npm-cache
  CCACHE_DIR: /mnt/sharedroot/github_runners/shared/ccache
  DOCKER_CONFIG: /mnt/sharedroot/github_runners/shared/docker-cache

jobs:
  sync:
    runs-on: [self-hosted, linux64]
    steps:
      - name: Checkout kexecboot.xyz
        uses: actions/checkout@v4

      - name: Fetch Latest Endpoints
        run: |
          mkdir -p upstream
          curl -sL "https://raw.githubusercontent.com/netbootxyz/netboot.xyz/master/endpoints.yml" -o upstream/endpoints.yml
          curl -sL "https://raw.githubusercontent.com/netbootxyz/netboot.xyz/master/user_overrides.yml" -o upstream/user_overrides.yml
          
      - name: Check for Changes
        id: git-check
        run: |
          git add upstream/
          git diff --staged --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(upstream): sync latest endpoints from netboot.xyz"
          title: "Automated Upstream Sync: endpoints.yml"
          body: |
            Automated synchronization of `endpoints.yml` and `user_overrides.yml` from the upstream netboot.xyz repository.
            
            Review changes to ensure no breaking structural changes to the YAML format before merging into the kexecboot parser.
          branch: auto/upstream-sync
          base: main
          labels: upstream, automated
